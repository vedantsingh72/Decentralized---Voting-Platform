<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e1e32"/>
      <stop offset="100%" stop-color="#0d0d1a"/>
    </linearGradient>
    <linearGradient id="sq" x1="3" y1="3" x2="29" y2="29" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </linearGradient>
  </defs>

  <!-- Dark background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Orange rounded square badge -->
  <rect x="4" y="4" width="24" height="24" rx="6" fill="url(#sq)"/>

  <!-- Bold "V" letterform -->
  <path d="M9 10 L16 22 L23 10" fill="none"
        stroke="white" stroke-width="3.2"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
